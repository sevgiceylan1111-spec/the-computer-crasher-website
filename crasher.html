<!DOCTYPE html>
<html>
<head>
    <title>REPLICATION_CORE</title>
    <link id="fav" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/></svg>">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; text-align: center; }
        .box { border: 2px solid #fff; padding: 50px; box-shadow: 0 0 20px #fff; }
        button { padding: 20px 40px; background: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        button:hover { background: red; color: #fff; }
    </style>
</head>
<body>

    <div class="box">
        <h1>SYSTEM READY</h1>
        <button onclick="start()">IGNITE</button>
    </div>

    <script>
        function start() {
            // Icon Glitch
            setInterval(() => {
                const p = () => Math.floor(Math.random() * 100);
                document.getElementById('fav').href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='${p()},${p()} ${p()},${p()} ${p()},${p()}' fill='white'/></svg>`;
            }, 60);

            // This line uses './' which means "look in the current folder"
            setInterval(() => {
                window.open('./notifacations.html', '_blank', 'width=400,height=400');
            }, 300);
        }
    </script>
</body>
</html>
