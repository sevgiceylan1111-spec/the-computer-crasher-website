<!DOCTYPE html>
<html>
<head>
    <title>MASTER_CONTROL</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { padding: 30px; background: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 1.5rem; }
        button:hover { background: #ff0000; color: #fff; }
    </style>
</head>
<body>
    <button onclick="ignite()">SPAWN RANDOM CHAOS</button>

    <script>
        function ignite() {
            setInterval(() => {
                // Calculate random screen position
                const w = 400; 
                const h = 400;
                const x = Math.floor(Math.random() * (window.screen.availWidth - w));
                const y = Math.floor(Math.random() * (window.screen.availHeight - h));
                
                // Open the file with specific coordinates
                window.open('notifacations.html', '_blank', `width=${w},height=${h},left=${x},top=${y},menubar=no,status=no`);
            }, 500);
        }
    </script>
</body>
</html>
