<!DOCTYPE html>
<html>
<head>
    <title>MASTER_CONTROL</title>
    <style>
        body { 
            background: #000; color: #00ff00; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }
        #status { margin-bottom: 20px; font-size: 1.2rem; color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .btn { 
            padding: 30px 60px; font-size: 2rem; background: #00ff00; color: #000; 
            border: none; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ff00;
        }
        .btn:active { transform: scale(0.95); background: #fff; }
    </style>
</head>
<body>

    <div id="status">! POP-UPS MUST BE ENABLED !</div>
    <button class="btn" onclick="ignite()">ACTIVATE</button>

    <script>
        function ignite() {
            console.log("Attempting to launch...");
            
            // 1. Open ONE window immediately to trigger the "Allow Popups" prompt
            const testWin = window.open("", "_blank", "width=100,height=100");
            if (!testWin || testWin.closed || typeof testWin.closed == 'undefined') {
                alert("BROWSER BLOCKED US! Click the red 'X' icon in your URL bar and select 'Always Allow', then click ACTIVATE again.");
                return;
            }

            // 2. If we have permission, start the chaos
            document.querySelector('.btn').innerHTML = "RUNNING...";
            
            setInterval(() => {
                const x = Math.floor(Math.random() * window.screen.availWidth);
                const y = Math.floor(Math.random() * window.screen.availHeight);
                
                // We create the window content on the fly
                const win = window.open("", "_blank", `width=300,height=300,left=${x},top=${y}`);
                
                if(win) {
                    win.document.write(`
                        <title>GLITCH</title>
                        <body style="background:white; animation: f 0.05s infinite;">
                            <style>
                                @keyframes f { 0%{background:#fff} 50%{background:#000} }
                            </style>
                            <h2 style="font-family:sans-serif; text-align:center;">VOID</h2>
                            <script>
                                // Auto-move the window
                                setInterval(() => {
                                    window.moveTo(Math.random()*screen.width, Math.random()*screen.height);
                                }, 300);
                                
                                // Notification spam
                                Notification.requestPermission().then(p => {
                                    if(p==='granted') {
                                        setInterval(() => {
                                            new Notification("ERROR", { body: "SIGNAL LOST", silent: true });
                                        }, 1000);
                                    }
                                });
                            <\/script>
                        </body>
                    `);
                }
            }, 600); // 0.6 seconds between windows so it doesn't freeze you immediately
        }
    </script>
</body>
</html>
