<!DOCTYPE html>
<html>
<head>
    <title>MASTER_CORE</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 2px solid #0f0; padding: 40px; box-shadow: 0 0 20px #0f0; }
        button { padding: 20px 40px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        button:active { background: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>REPLICATION_INIT</h1>
        <p>STATUS: READY</p>
        <button onclick="ignite()">EXECUTE PROTOCOL</button>
    </div>

    <script>
        function ignite() {
            // High-speed spawn loop
            setInterval(() => {
                const w = 350, h = 350;
                // Random spawn positions across the whole screen
                const x = Math.floor(Math.random() * (window.screen.availWidth - w));
                const y = Math.floor(Math.random() * (window.screen.availHeight - h));
                
                window.open('notifacations.html', '_blank', `width=${w},height=${h},left=${x},top=${y},menubar=no,status=no`);
            }, 150); 
        }
    </script>
</body>
</html>
