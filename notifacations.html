<!DOCTYPE html>
<html>
<head>
    <title>VOID_FEED</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        
        /* Full Screen Epilepsy/Glitch Style */
        #glitch {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #fff; z-index: 1;
            animation: pulse 0.04s infinite;
        }

        @keyframes pulse {
            0% { background: #fff; clip-path: inset(0 0 0 0); }
            33% { background: #000; clip-path: polygon(10% 0, 100% 20%, 80% 100%, 0 70%); }
            66% { background: #444; clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
            100% { background: #fff; clip-path: inset(0 0 0 0); }
        }

        #ui { position: relative; z-index: 10; height: 100vh; display: flex; justify-content: center; align-items: center; }
        button { padding: 30px; font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="glitch"></div>
    <div id="ui"><button onclick="chaos()">START NOTIF_SPAM</button></div>

    <script>
        const words = ["VOID", "NULL", "ERROR", "SIGNAL", "BREACH", "FATAL", "DATA", "LOST", "0x0", "STACK", "CORRUPT", "OVERFLOW"];

        async function chaos() {
            document.getElementById('ui').style.display = 'none';
            const perm = await Notification.requestPermission();
            
            if (perm === 'granted') {
                // Spammer: 1-10 random words every second
                setInterval(() => {
                    let count = Math.floor(Math.random() * 10) + 1;
                    let msg = "";
                    for(let i=0; i<count; i++) {
                        msg += words[Math.floor(Math.random() * words.length)] + " ";
                    }

                    new Notification("!", { body: msg.trim(), silent: true });
                }, 1000); 
            }
        }
    </script>
</body>
</html>
